<!DOCTYPE html>
<html lang="fr">
<head>

  <title>Yvan Photo | Portfolio</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>

<header class="hero">
  <div class="hero-content">

    <p>Urban photography • Light • Street • Architecture</p>
    <a href="#gallery" class="btn">Explorer le portfolio</a>

<nav class="nav">
  <div class="logo">YVAN</div>
  <ul>
    <li><a href="#street">Street</a></li>
    <li><a href="#architecture">Architecture</a></li>

</nav>

<main id="gallery">

  <!-- STREET -->
  <section id="street" class="section">
    <h2>Street Photography</h2>

  <!-- ARCHITECTURE -->

    <div class="grid">
      <img src="images/arch1.jpg" alt="">

      <img src="images/arch4.jpg" alt="">
    </div>
  </section>

  <!-- NIGHT -->
  <section id="night" class="section">
    <h2>Night & Lights</h2>
    <div class="grid">
      <img src="images/night1.jpg" alt="">
      <img src="images/night2.jpg" alt="">
      <img src="images/night3.jpg" alt="">

<footer>
  <p>© 2026 Yvan Photo — All rights reserved</p>
